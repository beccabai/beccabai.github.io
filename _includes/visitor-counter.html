<div class="tb-visitor-counter" aria-label="Site page views">
  <span class="tb-visitor-counter__dot"></span>
  <span class="tb-visitor-counter__label">Views</span>
  <span class="tb-visitor-counter__badge tb-visitor-counter__today">today preview</span>
  <span class="tb-visitor-counter__badge tb-visitor-counter__total">total preview</span>
</div>
<script>
  (function () {
    var today = document.querySelector(".tb-visitor-counter__today");
    var total = document.querySelector(".tb-visitor-counter__total");
    if (!today || !total || window.location.hostname !== "beccabai.github.io") return;

    function setBadge(target, src, fallbackText) {
      var img = new Image();
      img.alt = "";
      img.loading = "eager";
      img.decoding = "async";
      target.classList.add("is-loading");
      img.onload = function () {
        target.classList.remove("is-loading");
        target.classList.add("is-loaded");
      };
      img.onerror = function () {
        target.classList.remove("is-loading");
        target.textContent = fallbackText;
        target.classList.add("is-unavailable");
      };
      target.replaceChildren(img);
      img.src = src;
    }

    var parts = new Intl.DateTimeFormat("en", {
      timeZone: "Asia/Hong_Kong",
      year: "numeric",
      month: "2-digit",
      day: "2-digit"
    }).formatToParts(new Date()).reduce(function (acc, part) {
      acc[part.type] = part.value;
      return acc;
    }, {});
    var dateKey = parts.year + "-" + parts.month + "-" + parts.day;
    var badgeBase = "https://visitor-badge.laobi.icu/badge";
    var badgeStyle = "&left_color=%23b98992&right_color=%238f6670&format=true&radius=10&height=24";

    setBadge(today, badgeBase + "?page_id=beccabai.github.io.today." + dateKey + "&left_text=today" + badgeStyle, "today unavailable");
    setBadge(total, badgeBase + "?page_id=beccabai.github.io&left_text=total" + badgeStyle, "total unavailable");
  })();
</script>
